<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donate - LifeLink</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e6f2ff, #ffffff);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

header {
    background-color: #0a8f6a;
    color: white;
    padding: 15px 30px;
    font-size: 22px;
    font-weight: bold;
}

main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: white;
    padding: 40px;
    width: 350px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    text-align: center;
}

.card h2 {
    margin-bottom: 10px;
    color: #0a8f6a;
}

.card p {
    color: #555;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 20px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #0a8f6a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    background-color: #086c52;
}

footer {
    background-color: #1f2d3d;
    color: white;
    text-align: center;
    padding: 12px;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    LifeLink
</header>

<main>
    <div class="card">
        <h2>Make a Donation</h2>
        <p>Your contribution supports organ donation awareness and hospital systems.</p>

        <input type="number" id="amount" placeholder="Enter Amount (₹)">

        <button onclick="pay()">Pay Now</button>
    </div>
</main>

<footer>
    © 2026 LifeLink | Organ Donation Platform
</footer>

<script>
function pay(){
    var amount = document.getElementById("amount").value;

    if(amount == "" || amount <= 0){
        alert("Please enter a valid amount.");
    } else {
        alert("Payment Successful! Thank you for donating ₹" + amount);
    }
}
</script>

</body>
</html>
